name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "V*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Read version from tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -notmatch '^[vV](?<Version>\d+\.\d+\.\d+)$') {
            throw "Tag must match v<major>.<minor>.<patch> or V<major>.<minor>.<patch>, for example v0.1.0 or V0.1.0."
          }

          "VERSION=$($Matches.Version)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Read release notes from changelog
        shell: pwsh
        run: |
          $lines = Get-Content -Path changelog.md
          $start = -1

          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -notmatch '^\s*##\s+(.+?)\s*$') {
              continue
            }

            $heading = $Matches[1].Trim()
            if ($heading -ieq $env:GITHUB_REF_NAME -or
                $heading -ieq $env:VERSION -or
                $heading -ieq "v$env:VERSION" -or
                $heading -ieq "V$env:VERSION") {
              $start = $i + 1
              break
            }
          }

          if ($start -lt 0) {
            throw "changelog.md must contain a second-level heading for $env:GITHUB_REF_NAME."
          }

          $end = $lines.Count
          for ($i = $start; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^\s*##\s+') {
              $end = $i
              break
            }
          }

          $notes = if ($end -gt $start) { $lines[$start..($end - 1)] } else { @() }
          if (-not ($notes | Where-Object { $_.Trim().Length -gt 0 })) {
            throw "changelog.md section for $env:GITHUB_REF_NAME is empty."
          }

          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Set-Content -Path artifacts/release-notes.md -Value $notes -Encoding utf8

      - name: Restore
        run: dotnet restore TypingPractice.sln

      - name: Test
        run: dotnet test TypingPractice.sln --configuration Release --no-restore

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish TypingCore.Wpf/TypingCore.Wpf.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output artifacts/publish `
            -p:Version=$env:VERSION `
            -p:AssemblyVersion=$env:VERSION.0 `
            -p:FileVersion=$env:VERSION.0

      - name: Restore Velopack CLI
        run: dotnet tool restore

      - name: Pack Velopack release
        shell: pwsh
        run: |
          dotnet tool run vpk pack `
            --packId TypingPractice `
            --packVersion $env:VERSION `
            --packDir artifacts/publish `
            --mainExe TypingPractice.exe `
            --channel win

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -Path Releases -File | ForEach-Object { $_.FullName }
          gh release create $env:GITHUB_REF_NAME $assets `
            --repo $env:GITHUB_REPOSITORY `
            --title $env:GITHUB_REF_NAME `
            --notes-file artifacts/release-notes.md
